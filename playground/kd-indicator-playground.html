# kd-indicator Playground

Interactive chart exploration for the indicator chart components (`IndicatorChart.svelte`, `EffectChart.svelte`, `ObjectiveChart.svelte`).

Each cell is **reactive** — change a design token or slider and all dependent charts update automatically.

**Sections:**
1. Design Tokens (colors, line widths, options)
2. Sample Data (main indicator, comparison cities, effects)
3. Helper functions
4. Charts: C (Comparison), C1 (observable10), C2 (Set1), D (Highlight), E (Card), F (Effect Bar)
  </script>

  <script id="53" type="application/vnd.observable.javascript">
// Renders a legend row with SVG line swatches (supports dash patterns)
function makeLegend(entries) {
  const wrap = document.createElement('div')
  wrap.style.cssText = 'display:flex; flex-wrap:wrap; gap:0.5rem 1.5rem; padding:0.75rem 0 0.25rem; border-top:1px solid #e5e7eb; margin-top:0.25rem;'
  for (const { title, color, width, dash } of entries) {
    const item = document.createElement('div')
    item.style.cssText = 'display:flex; align-items:center; gap:0.375rem;'
    const svgH = Math.max(width * 2, 10)
    const midY = svgH / 2
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
    svg.setAttribute('width', '28')
    svg.setAttribute('height', String(svgH))
    svg.style.flexShrink = '0'
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line')
    line.setAttribute('x1', '0')
    line.setAttribute('y1', String(midY))
    line.setAttribute('x2', '28')
    line.setAttribute('y2', String(midY))
    line.setAttribute('stroke', color)
    line.setAttribute('stroke-width', String(width))
    if (dash) line.setAttribute('stroke-dasharray', dash)
    line.setAttribute('stroke-linecap', dash ? 'butt' : 'round')
    svg.append(line)
    const label = document.createElement('span')
    label.textContent = title
    label.style.cssText = 'font-size:12px; color:#374151;'
    item.append(svg, label)
    wrap.append(item)
  }
  return wrap
}
  </script>

  <script id="36" type="text/markdown">
### Variant C – Comparison Mode (NEW)
Main indicator (thick blue) + up to 7 comparison lines with right-edge labels.
  </script>

  <script id="37" type="application/vnd.observable.javascript">
{
  // Map series titles to slots (City G fällt raus — kein 7. Slot)
  const slotKeys = ['compare-1', 'compare-2', 'compare-3', 'ref-state', 'ref-federal', 'ref-benchmark']
  const slots = [
    [mainIndicator.title, 'own'],
    ...comparisonIndicators.slice(0, 6).map((ind, i) => [ind.title, slotKeys[i]]),
  ]
  const slotMap = new Map(slots)

  const allData = [mainIndicator, ...comparisonIndicators.slice(0, 6)].flatMap((ind) =>
    ind.historicalValues.map(([year, value]) => ({
      date: new Date(year, 0, 1),
      value,
      title: ind.title,
      slot: slotMap.get(ind.title),
    }))
  )

  // One Plot.lineY mark per slot so each gets its own strokeDasharray
  const lineMarks = slots.flatMap(([title, slot]) => {
    const tk = INDICATOR_TOKENS[slot]
    const data = allData.filter((d) => d.title === title)
    return [
      Plot.lineY(data, {
        x: 'date', y: 'value',
        stroke: tk.color,
        strokeWidth: tk.width,
        strokeDasharray: tk.dash,
        strokeLinecap: tk.linecap,
      }),
      ...(SHOW_DOTS ? [Plot.dot(data, {
        x: 'date', y: 'value',
        fill: tk.color,
        r: slot === 'own' ? DOT_RADIUS + 1 : DOT_RADIUS - 0.5,
      })] : []),
    ]
  })

  const labelData = slots
    .map(([title, slot]) => {
      const pt = allData.find((d) => d.title === title && d.date.getFullYear() === 2024)
      return pt ? { ...pt, slot } : null
    })
    .filter(Boolean)

  const legendEntries = slots.map(([title, slot]) => ({
    title, color: INDICATOR_TOKENS[slot].color,
    width: INDICATOR_TOKENS[slot].width, dash: INDICATOR_TOKENS[slot].dash,
  }))

  const wrap = document.createElement('div')
  wrap.append(
    Plot.plot({
      title: 'Variant C: Comparison Mode (indicator tokens)',
      width: CHART_WIDTH,
      height: CHART_HEIGHT,
      marginLeft: 60,
      marginRight: 40,
      marginTop: 40,
      marginBottom: 40,
      grid: SHOW_GRID,
      marks: [
        ...lineMarks,
        ...(SHOW_TOOLTIPS
          ? [Plot.tip(allData, Plot.pointerX({
              x: 'date', y: 'value',
              title: (d) => `${d.title}\n${d.date.getFullYear()}: ${d.value.toFixed(1)} ${mainIndicator.unit}`,
            }))]
          : []),
      ],
      y: { label: mainIndicator.unit },
      x: { type: 'time' },
    }),
    makeLegend(legendEntries)
  )
  return wrap
}
  </script>

Derselbe Chart in drei festen Breiten: 320 px (mobile), 600 px (tablet), 960 px (desktop).
  </script>

  <script id="50" type="application/vnd.observable.javascript">
// Helper – gibt einen Comparison-Chart für eine feste Breite zurück (indicator tokens)
function comparisonChart(width) {
  const slotKeys = ['compare-1', 'compare-2', 'compare-3', 'ref-state', 'ref-federal', 'ref-benchmark']
  const slots = [
    [mainIndicator.title, 'own'],
    ...comparisonIndicators.slice(0, 6).map((ind, i) => [ind.title, slotKeys[i]]),
  ]
  const slotMap = new Map(slots)

  const allData = [mainIndicator, ...comparisonIndicators.slice(0, 6)].flatMap((ind) =>
    ind.historicalValues.map(([year, value]) => ({
      date: new Date(year, 0, 1), value,
      title: ind.title, slot: slotMap.get(ind.title),
    }))
  )

  const height = Math.round(width * 0.6)
  const marginRight = width < 400 ? 80 : 150

  const lineMarks = slots.flatMap(([title, slot]) => {
    const tk = INDICATOR_TOKENS[slot]
    const data = allData.filter((d) => d.title === title)
    return [Plot.lineY(data, {
      x: 'date', y: 'value',
      stroke: tk.color, strokeWidth: tk.width,
      strokeDasharray: tk.dash, strokeLinecap: tk.linecap,
    })]
  })

  const labelData = slots
    .map(([title, slot]) => {
      const pt = allData.find((d) => d.title === title && d.date.getFullYear() === 2024)
      return pt ? { ...pt, slot } : null
    })
    .filter(Boolean)

  const legendEntries = slots.map(([title, slot]) => ({
    title, color: INDICATOR_TOKENS[slot].color,
    width: INDICATOR_TOKENS[slot].width, dash: INDICATOR_TOKENS[slot].dash,
  }))

  const wrap = document.createElement('div')
  wrap.append(
    Plot.plot({
      width, height,
      marginLeft: 44, marginRight,
      marginTop: 32, marginBottom: 32,
      grid: SHOW_GRID,
      style: { fontSize: "12px" },
      marks: [
        ...lineMarks,
        ...(SHOW_TOOLTIPS
          ? [Plot.tip(allData, Plot.pointerX({
              x: 'date', y: 'value',
              title: (d) => `${d.title}\n${d.date.getFullYear()}: ${d.value.toFixed(1)} ${mainIndicator.unit}`,
            }))]
          : []),
      ],
      y: { label: mainIndicator.unit, ticks: 4 },
      x: { type: 'time' },
    }),
    makeLegend(legendEntries)
  )
  return wrap
}
  </script>

  <script id="51" type="application/vnd.observable.javascript">
{
  const sizes = [320, 600, 960]
  const wrap = document.createElement("div")
  wrap.style.cssText = "display:flex; flex-direction:column; gap:2rem;"
  for (const w of sizes) {

One line is highlighted, all others are dimmed. Use the slider to select which city to focus on.

  <script id="39" type="application/vnd.observable.javascript">
viewof highlightIndex = Inputs.range([0, 7], {step: 1, value: 0, label: "Highlight (0 = main, 1–7 = comparison)"})
  </script>

  <script id="40" type="application/vnd.observable.javascript">
{
  const allLines = [mainIndicator, ...comparisonIndicators]
  const highlightedTitle = allLines[highlightIndex].title

  const allData = allLines.flatMap((ind, idx) =>
    ind.historicalValues.map(([year, value]) => ({
      date: new Date(year, 0, 1),
      value,
      title: ind.title,
      color: ind.title === mainIndicator.title
        ? COLORS.mainLine
        : COLORS.comparisonColors[idx - 1],
    }))
  )

  const highlighted = allData.filter((d) => d.title === highlightedTitle)
  const dimmed = allData.filter((d) => d.title !== highlightedTitle)

  return Plot.plot({
    title: `Variant D: Highlight — ${highlightedTitle}`,
    width: CHART_WIDTH,
    height: CHART_HEIGHT,
    marginLeft: 60,
    marginRight: 180,
    marginTop: 40,
    marginBottom: 40,
    grid: SHOW_GRID,
    marks: [
      // Dimmed lines (gray, thin)
      Plot.lineY(dimmed, {
        x: "date",
        y: "value",
        stroke: "#d1d5db",
        strokeWidth: 1,
        z: "title",
      }),
      // Highlighted line (colored, thicker)
      Plot.lineY(highlighted, {
        x: "date",
        y: "value",
        stroke: highlighted[0]?.color,
        strokeWidth: LINE_WIDTH.main,
      }),
      // Dots on highlighted line
      ...(SHOW_DOTS
        ? [Plot.dot(highlighted, {
            x: "date",
            y: "value",
            fill: highlighted[0]?.color,
            r: DOT_RADIUS + 1,
          })]
        : []),
      // Label on highlighted line
      Plot.text(
        highlighted.filter((d) => d.date.getFullYear() === 2024),
        {
          x: "date",
          y: "value",
          text: "title",
          dx: 8,
          textAnchor: "start",
          fontSize: 12,
          fontWeight: "bold",
          fill: highlighted[0]?.color,
        }
      ),
      // Tooltips
      ...(SHOW_TOOLTIPS
        ? [Plot.tip(highlighted, Plot.pointerX({
            x: "date",
            y: "value",
            title: (d) => `${d.title}\n${d.date.getFullYear()}: ${d.value.toFixed(1)} ${mainIndicator.unit}`,
          }))]
        : []),
    ],
    y: { label: mainIndicator.unit },
    x: { type: "time" },
  })
}
  </script>

  <script id="42" type="application/vnd.observable.javascript">
{

  return Plot.plot({

        x: "date",
        y: "value",
        stroke: COLORS.mainLine,
        strokeWidth: 1.5,
