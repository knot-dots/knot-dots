name: CI (elasticsearch)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-elasticsearch.yaml"
      - "elasticsearch/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-elasticsearch.yaml"
      - "elasticsearch/**"

env:
  ELASTICSEARCH_VERSION: 9.2.3
  REGISTRY: rg.fr-par.scw.cloud/knot-dots

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          build-args: ELASTICSEARCH_VERSION=${{ env.ELASTICSEARCH_VERSION }}
          context: elasticsearch
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/elasticsearch:${{ github.sha }}
            ${{ env.REGISTRY }}/elasticsearch:${{ env.ELASTICSEARCH_VERSION }}
