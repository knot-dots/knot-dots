name: CI (app)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-app.yaml"
      - "app/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-app.yaml"
      - "app/**"
  workflow_dispatch:

env:
  REGISTRY: rg.fr-par.scw.cloud/knot-dots

jobs:
  check:
    timeout-minutes: 10
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./package-lock.json
      - run: npm clean-install
      - run: npm run check
      - run: npm run lint

  build:
    needs: check
    timeout-minutes: 10
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v4
      - name: Build and cache Docker image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: "."
          file: "./app/Dockerfile"
          target: production
          push: false
          tags: app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-unit:
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v4
      - name: Load dev image from cache
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: "."
          file: "./app/Dockerfile"
          target: dev
          load: true
          tags: app:test
          cache-from: type=gha
      - name: Apply database migrations
        run: docker compose run --rm migrate
      - name: Run unit and integration tests
        # ELASTICSEARCH_INDEX_ALIAS is unset because the Elasticsearch comparison
        # tests need an index seeded with sample data, which is not available
        # here; they skip themselves when the variable is empty. models.test.ts
        # predates the removal of legacy categories and needs to be reworked
        # before it can run again.
        run: >-
          docker compose run --rm --no-deps -e ELASTICSEARCH_INDEX_ALIAS=
          app npm run test:unit --workspace app -- run --exclude src/lib/models.test.ts
        env:
          TEST_APP_IMAGE: app:test-unit # Use the pre-built image for tests

  test-e2e:
    # test-unit is a prerequisite so that a failing unit or integration test
    # fails fast instead of burning four end-to-end shards.
    needs: test-unit
    timeout-minutes: 60
    runs-on: ubuntu-24.04-arm-large
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./package-lock.json
      - run: npm clean-install
      - name: Generate SvelteKit aliases ($lib) without running full type check
        run: npx svelte-kit sync
      - run: npx playwright install --with-deps
      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v4
      - name: Load Docker image from cache
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: "."
          file: "./app/Dockerfile"
          target: production
          load: true
          tags: app:test
          cache-from: type=gha
      - name: Add keycloak entry to /etc/hosts
        run: echo "127.0.0.1 keycloak" | sudo tee -a /etc/hosts
      - run: npx playwright test --shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          TEST_IMAGE: app:test # Use the pre-built image for tests
      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: ./app/blob-report
          retention-days: 1

  merge-reports:
    needs: test-e2e
    if: ${{ !cancelled() }}
    timeout-minutes: 10
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./package-lock.json
      - run: npm clean-install
      - name: Download all blob reports
        uses: actions/download-artifact@v7
        with:
          path: ./app/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: app/playwright-report
          retention-days: 14

  publish:
    needs: test-e2e
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: "."
          file: "./app/Dockerfile"
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/app:${{ github.sha }}
            ${{ env.REGISTRY }}/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
